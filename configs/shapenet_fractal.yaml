SOLVER:
  gpu: 0,
  run: train

  logdir: logs/fractal/shapenet_fractal
  max_epoch: 400
  test_every_epoch: 1
  log_per_iter: 50
  ckpt_num: 10
  port: 10001

  # optimizer
  type: adamw
  weight_decay: 0.01
  lr: 0.0001
  rand_seed: 42
  use_amp: True

  # learning rate
  lr_type: constant
  step_size: (160,240)

  # mesh extraction
  resolution: 256
  sdf_scale: 0.9


DATA:
  train:
    name: &name shapenet

    # octree building
    depth: &depth 8
    full_depth: &full_depth 3
    points_scale: &points_scale 0.5    # original data in [-0.5, 0.5]

    # sdf & surface samples
    volume_sample_num: &volume_sample_num 10000
    surface_sample_num: &surface_sample_num 10000
    max_points: &max_points 120000
    tsdf: &tsdf 0.05

    # no data augmentation
    distort: &distort False

    # data loading
    location: &location data/ShapeNet/datasets_256_test
    filelist: data/ShapeNet/datasets_256_test/overfit.txt
    load_pointcloud: True
    load_sdf: True
    batch_size: 2
    shuffle: True

  test:
    name: *name

    # octree building
    depth: *depth
    full_depth: *full_depth
    points_scale: *points_scale

    # sdf & surface samples
    volume_sample_num: *volume_sample_num
    surface_sample_num: *surface_sample_num
    max_points: *max_points
    tsdf: *tsdf

    # no data augmentation
    distort: *distort

    # data loading
    location: *location
    filelist: data/ShapeNet/datasets_256_test/overfit.txt
    load_pointcloud: True
    load_sdf: True
    batch_size: 1
    shuffle: False
    sdf_scale: 0.9


MODEL:
  depth: *depth
  full_depth: *full_depth
  depth_stop: 6
  find_unused_parameters: True

  FractalGen:
    feature_dim: 384
    num_heads: 8
    blocks_per_level: 6
    full_depth: 3
    depth_stop: 6
    patch_size: 2048
    dilation: 2
    drop_rate: 0.1
    pos_emb_type: SinPosEmb
    norm_type: LayerNorm
    use_checkpoint: True
    use_swin: True
    sdf_hidden_dim: 256
    sdf_num_layers: 4
    sdf_weight: 1.0
    split_weight: 1.0
