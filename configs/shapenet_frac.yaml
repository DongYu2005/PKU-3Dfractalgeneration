SOLVER:
  gpu: 0,
  run: train

  logdir: logs/fractal/shapenet_fractal_vq
  max_epoch: 400
  test_every_epoch: 50
  log_per_iter: 500
  ckpt_num: 10
  port: 10001

  # optimizer
  type: adamw
  weight_decay: 0.01
  lr: 0.0001
  rand_seed: 42
  use_amp: True

  # learning rate
  lr_type: constant
  step_size: (160,240)

  # mesh extraction
  resolution: 256
  sdf_scale: 0.9


DATA:
  train:
    num_workers: 16
    pin_memory: True
    name: &name shapenet

    # octree building
    depth: &depth 8
    full_depth: &full_depth 3
    points_scale: &points_scale 1.0    # OctGPT uses 1.0 (not 0.5)

    # sdf & surface samples (still loaded for octree building)
    volume_sample_num: &volume_sample_num 10000
    surface_sample_num: &surface_sample_num 10000
    max_points: &max_points 120000
    tsdf: &tsdf 0.05

    # no data augmentation
    distort: &distort False

    # data loading
    location: &location data/ShapeNet/datasets_256_test
    filelist: &filelist data/ShapeNet/filelist/train_airplane.txt
    load_pointcloud: True
    load_sdf: False       # No longer need SDF query points for training
    batch_size: 2
    shuffle: True

  test:
    name: *name
    depth: *depth
    full_depth: *full_depth
    points_scale: *points_scale
    volume_sample_num: *volume_sample_num
    surface_sample_num: *surface_sample_num
    max_points: *max_points
    tsdf: *tsdf
    distort: *distort
    location: *location
    filelist: data/ShapeNet/filelist/test_airplane.txt
    load_pointcloud: True
    load_sdf: False
    batch_size: 1
    shuffle: False
    sdf_scale: 0.9


MODEL:
  depth: *depth
  full_depth: *full_depth
  depth_stop: 6
  find_unused_parameters: True

  # ---- Pre-trained VQ-VAE (frozen, from OctGPT) ----
  vqvae_ckpt: saved_ckpt/vqvae_large_im5_uncond_bsq32.pth

  VQVAE:
    name: vqvae_large
    in_channels: 4
    embedding_channels: 32
    quantizer_type: bsq
    feature: ND

  # ---- Fractal Generator ----
  FractalGen:
    feature_dim: 384
    num_heads: 8
    blocks_per_level: 6
    full_depth: 3
    depth_stop: 6
    patch_size: 2048
    dilation: 2
    drop_rate: 0.1
    pos_emb_type: SinPosEmb
    norm_type: LayerNorm
    use_checkpoint: True
    use_swin: True
    split_weight: 1.0
    vq_weight: 1.0
    vq_groups: 32         # Must match VQVAE.embedding_channels
    vq_size: 2            # BSQ: binary per group
    expander_num_heads: 4