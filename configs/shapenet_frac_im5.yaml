SOLVER:
  gpu: 0,1,2,3
  run: train
  ddp_mode: spawn

  logdir: logs/fractal/im5_gen
  max_epoch: 50
  test_every_epoch: 10
  log_per_iter: 500
  ckpt_num: 5
  port: 10001

  # optimizer
  type: adamw
  weight_decay: 0.01
  lr: 0.0001
  rand_seed: 42
  use_amp: True

  # learning rate
  lr_type: constant
  step_size: (160,240)

  # mesh extraction
  resolution: 256
  sdf_scale: 0.9


DATA:
  train:
    num_workers: 8
    pin_memory: True
    name: &name shapenet

    # octree building
    depth: &depth 8
    full_depth: &full_depth 3
    points_scale: &points_scale 1.0

    # sdf & surface samples
    volume_sample_num: &volume_sample_num 10000
    surface_sample_num: &surface_sample_num 10000
    max_points: &max_points 120000
    tsdf: &tsdf 0.05

    distort: &distort False

    # data loading (im_5: 20438 train samples across 5 categories)
    location: &location data/ShapeNet/datasets_256_test
    filelist: data/ShapeNet/filelist/train_im_5.txt
    load_pointcloud: True
    load_sdf: False
    batch_size: 8
    shuffle: True

  test:
    name: *name
    depth: *depth
    full_depth: *full_depth
    points_scale: *points_scale
    volume_sample_num: *volume_sample_num
    surface_sample_num: *surface_sample_num
    max_points: *max_points
    tsdf: *tsdf
    distort: *distort
    location: *location
    filelist: data/ShapeNet/filelist/test_im_5.txt
    load_pointcloud: True
    load_sdf: False
    batch_size: 1
    shuffle: False
    sdf_scale: 0.9


MODEL:
  depth: *depth
  full_depth: *full_depth
  depth_stop: 6
  find_unused_parameters: True

  # ---- Pre-trained VQ-VAE (frozen) ----
  vqvae_ckpt: saved_ckpt/vqvae_large_im5_uncond_bsq32.pth

  VQVAE:
    name: vqvae_large
    in_channels: 4
    embedding_channels: 32
    quantizer_type: bsq
    feature: ND

  # ---- Fractal Generator ----
  FractalGen:
    # core architecture
    feature_dim: 384
    num_heads: 8
    blocks_per_level: 6
    full_depth: 3
    depth_stop: 6
    patch_size: 2048
    dilation: 2
    drop_rate: 0.1
    pos_emb_type: SinPosEmb
    norm_type: LayerNorm
    use_checkpoint: True
    use_swin: True
    split_weight: 1.0
    vq_weight: 1.0
    vq_groups: 32
    vq_size: 2
    expander_num_heads: 4
    # v4 hyperparameters (kept here so override configs can change them via merge)
    focal_alpha: 0.75
    focal_gamma: 2.0
    split_threshold: 0.45
    # v5 flag defaults (kept here for yacs strict-mode override compatibility;
    # values below reproduce v4 baseline; experiment configs override these)
    use_masked_training: False
    mask_ratio_min: 0.5
    buffer_size: 0
    mid_blocks_per_level: [1, 1, 1]
    use_sibling_attn: False
    use_focal_loss: True
    metric_mask_ratio: 0.7

# top-level: number of meshes to generate (used by SOLVER.run=generate)
num_generate: 30
