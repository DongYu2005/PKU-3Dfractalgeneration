# ============================================================================
# Debug / small-scale validation config
#
# Purpose: verify that the full pipeline (data → forward → loss → generate →
#          marching cubes → .obj) runs without errors, on a single GPU with
#          minimal memory & time.
#
# Key differences from full config:
#   - feature_dim: 64 (vs 384)        → ~36x fewer params in attention
#   - blocks_per_level: 2 (vs 6)      → lighter transformer
#   - depth_stop: 4 (vs 6)            → only 1 expansion level (depth 3→4)
#   - batch_size: 1
#   - max_epoch: 10                    → quick turnaround
#   - resolution: 64                   → fast marching cubes
#   - diffusion_mlp_width: 128        → lighter DiffLoss MLP
#   - sample counts halved             → faster data loading
#
# Usage:
#   python main_fractal.py --config configs/shapenet_fractal_debug.yaml
# ============================================================================

SOLVER:
  gpu: 0,
  run: train

  logdir: logs/fractal/debug
  max_epoch: 10
  test_every_epoch: 2
  log_per_iter: 10
  ckpt_num: 3
  port: 10002

  # optimizer
  type: adamw
  weight_decay: 0.01
  lr: 0.0003
  rand_seed: 42
  use_amp: True

  # learning rate
  lr_type: constant
  step_size: (8,)

  # mesh extraction (small grid for speed)
  resolution: 64
  sdf_scale: 0.9

DATA:
  train:
    name: &name shapenet

    # octree building
    depth: &depth 8
    full_depth: &full_depth 3
    points_scale: &points_scale 0.5

    # reduced sample counts for speed
    volume_sample_num: &volume_sample_num 4000
    surface_sample_num: &surface_sample_num 4000
    max_points: &max_points 60000
    tsdf: &tsdf 0.05

    distort: &distort False

    # data loading — use the same ShapeNet data as full config
    location: &location data/ShapeNet/dataset_256
    filelist: &filelist data/ShapeNet/filelist/train_airplane.txt
    load_pointcloud: True
    load_sdf: True
    batch_size: 1
    shuffle: True

  test:
    name: *name
    depth: *depth
    full_depth: *full_depth
    points_scale: *points_scale
    volume_sample_num: *volume_sample_num
    surface_sample_num: *surface_sample_num
    max_points: *max_points
    tsdf: *tsdf
    distort: *distort
    location: *location
    filelist: data/ShapeNet/filelist/test_airplane.txt
    load_pointcloud: True
    load_sdf: True
    batch_size: 1
    shuffle: False
    sdf_scale: 0.9


MODEL:
  depth: *depth
  full_depth: *full_depth
  depth_stop: 4
  find_unused_parameters: True

  FractalGen:
    # NOTE: feature_dim / num_heads must be divisible by 6 (OctFormer RoPE constraint)
    feature_dim: 48
    num_heads: 4
    blocks_per_level: 2
    full_depth: 3
    depth_stop: 4
    patch_size: 512
    dilation: 2
    drop_rate: 0.0
    pos_emb_type: SinPosEmb
    norm_type: LayerNorm
    use_checkpoint: False
    use_swin: True
    sdf_hidden_dim: 48
    sdf_num_layers: 3
    sdf_weight: 1.0
    split_weight: 1.0
    expander_num_heads: 2
